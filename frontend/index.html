<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadística Pro</title>
    <!-- Importación de la fuente del Conversor -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="container">
        <h1>Distribución de Frecuencias</h1>
        <p>Rellena los valores de <strong>Dato</strong> y <strong>fi</strong> directamente en la tabla, luego presiona <strong>Calcular</strong>.</p>
        
        <div class="input-group">
            <button onclick="procesarEstadistica()">Calcular</button>
        </div>

        <div id="resultadoArea">
            <div class="table-actions">
                <button id="agregarFilaBtn" type="button">Agregar fila</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Dato</th>
                        <th>fi</th>
                        <th>ni</th>
                        <th>Fi</th>
                        <th>Ni</th>
                    </tr>
                </thead>
                <tbody id="tablaCuerpo"></tbody>
                <tfoot id="footer-totales" class="hidden">
                    <tr>
                        <th>Total</th>
                        <th id="total-fi">0</th>
                        <th id="total-ni">0</th>
                        <th id="total-Fi">0</th>
                        <th id="total-Ni">0</th>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
    <script src="app.js?v=2" defer></script>
</body>
</html>
